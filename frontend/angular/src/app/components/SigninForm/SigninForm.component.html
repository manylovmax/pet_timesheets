<div class="bg-gray-200 rounded-2xl p-4 flex flex-col gap-4 items-center">
  <div>Sign in</div>
  <InputComponent 
    type="email"
    label="Email"
    [(value)]="email"
  />
  <InputComponent 
    label="Password"
    type="password" 
    [(value)]="password"
  />
  <button 
    class="bg-green-300 rounded-2xl px-2 uppercase"
    (click)="login()"
  >submit</button>
  <a 
    class="underline"
    [routerLink]="['/signup']">
    Signup
 </a>
</div>
