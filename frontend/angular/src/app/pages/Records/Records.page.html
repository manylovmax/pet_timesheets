<MainLayout>
  <div class="flex flex-col">
    <div class="flex">
      <div class="uppercase cursor-pointer p-2 bg-gray-100 rounded-2xl"
        (click)="goToCreate()"
      >Create</div>
    </div>
    <TableComponent 
      [columns]="columns"
      [rows]="mappedRecords()"
      [deleteButton]="true"
      [updateButton]="true"
      (update)="goToUpdatePage($event)"
      (delete)="deleteRecord($event)"
    />
  </div>
</MainLayout>
