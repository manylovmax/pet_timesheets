upstream auth {
    server auth_service:80; # FastAPI Auth Service
    keepalive 32;
}

upstream timesheets {
    server timesheets_service:80; # FastAPI Protected Timesheets Service
}

server {
    listen 80;
    server_name api_gateway;

    # Public Endpoint: Login/Token Generation
    location /api/v1/auth/ {
        proxy_pass http://auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # RECOMMENDED: Pass alternative metadata explicitly for safety
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Protected Endpoint: Timesheets
    location /api/v1/timesheets/ {
        if ($request_method = 'OPTIONS') {
            # change to frontend server host
            add_header 'Access-Control-Allow-Origin' 'http://localhost:8081' always;
            add_header 'Access-Control-Allow-Methods' * always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Headers' * always;
            return 204; # Return 204 No Content, bypassing auth_request
        }

        # Trigger internal authentication check
        auth_request /validate;
        # Optional: Inject user details from Auth Service into downstream headers
        # auth_request_set $user_id $upstream_http_x_user_id;
        # proxy_set_header X-User-Id $user_id;
        proxy_pass http://timesheets/;
        proxy_set_header Host $host;
        # RECOMMENDED: Pass alternative metadata explicitly for safety
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Internal subrequest rule for validation
    location = /validate {
        internal;
        proxy_pass http://auth/verify;
        proxy_method GET;
        proxy_pass_request_headers on;
        # FIX: Pass the original host name being hit by the client
        proxy_set_header Host $host;
        # RECOMMENDED: Pass alternative metadata explicitly for safety
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        # Performance optimizations for subrequests
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }
}