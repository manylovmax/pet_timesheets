upstream auth_service {
    server auth_service:80; # FastAPI Auth Service
}

upstream timesheets_service {
    server timesheets_service:80; # FastAPI Protected Timesheets Service
}

server {
    listen 80;
    server_name api_gateway;

    # Public Endpoint: Login/Token Generation
    location /api/v1/auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket support (Required if your FastAPI utilizes WebSockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Protected Endpoint: Timesheets
    location /api/v1/timesheets/ {
        # Trigger internal authentication check
        auth_request /_validate_token;

        # Optional: Inject user details from Auth Service into downstream headers
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;

        proxy_pass http://timesheets_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support (Required if your FastAPI utilizes WebSockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Internal subrequest rule for validation
    location = /_validate_token {
        internal;
        proxy_pass http://auth_service/verify;
        
        # Pass along the original Authorization headers
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
}