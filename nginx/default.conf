upstream auth_service {
    server 127.0.0.1:8001; # FastAPI Auth Service
}

upstream orders_service {
    server 127.0.0.1:8002; # FastAPI Protected Orders Service
}

server {
    listen 80;
    server_name ://example.com;

    # Public Endpoint: Login/Token Generation
    location /api/v1/auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected Endpoint: Orders
    location /api/v1/orders/ {
        # Trigger internal authentication check
        auth_request /_validate_token;

        # Optional: Inject user details from Auth Service into downstream headers
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;

        proxy_pass http://orders_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Internal subrequest rule for validation
    location = /_validate_token {
        internal;
        proxy_pass http://auth_service/verify;
        
        # Pass along the original Authorization headers
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
}